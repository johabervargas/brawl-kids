<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Brawl Kids — Coop</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:#1a1035; font-family:system-ui, sans-serif; touch-action:none; user-select:none; -webkit-user-select:none; }
  #game { display:block; width:100vw; height:100vh; }

  .overlay {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; padding:20px;
    background:radial-gradient(circle at 50% 30%, #2d1b5e 0%, #1a1035 70%);
    z-index:10; overflow-y:auto;
  }
  .hidden { display:none !important; }
  h1 { color:#ffd93d; font-size:min(11vw, 52px); letter-spacing:1px;
    text-shadow:0 4px 0 #b8860b, 0 8px 18px rgba(0,0,0,.5); transform:rotate(-2deg); }
  .sub { color:#b9a8e8; font-size:15px; margin-top:-10px; }
  .btn { font-size:20px; font-weight:800; color:#fff; border:none; cursor:pointer;
    padding:16px 34px; border-radius:16px; min-width:240px; box-shadow:0 5px 0 rgba(0,0,0,.35); }
  .btn:active { transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.35); }
  .btn:disabled { opacity:.45; }
  .btn-host { background:linear-gradient(#4fc3f7,#1e88e5); }
  .btn-join { background:linear-gradient(#ff8a65,#e64a19); }
  .btn-back { background:#4a3b7a; font-size:15px; min-width:0; padding:10px 22px; }
  .btn-go { background:linear-gradient(#9ccc65,#558b2f); }
  #codeInput { font-size:34px; font-weight:800; text-align:center; letter-spacing:12px;
    width:240px; padding:12px; border-radius:14px; border:3px solid #6a5acd;
    background:#0f0a24; color:#ffd93d; text-transform:uppercase; outline:none; }
  .code-big { font-size:min(20vw, 84px); font-weight:900; letter-spacing:16px;
    color:#ffd93d; background:#0f0a24; padding:14px 20px 14px 36px; border-radius:18px; border:3px dashed #6a5acd; }
  .msg { color:#e6ddff; font-size:16px; text-align:center; max-width:320px; line-height:1.5; }
  .pulse { animation:pulse 1.2s infinite; }
  @keyframes pulse { 50% { opacity:.45; } }

  #fsBtn { position:fixed; top:calc(env(safe-area-inset-top,0px) + 8px); right:8px;
    z-index:20; width:44px; height:44px; border:none; border-radius:12px;
    background:rgba(15,10,36,.7); color:#ffd93d; font-size:22px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; }
  #fsBtn:active { transform:scale(.92); }

  /* seleção de personagem */
  #charGrid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; width:100%; max-width:520px; }
  .card { background:#251746; border:3px solid #3a2a63; border-radius:16px; padding:14px 10px;
    text-align:center; cursor:pointer; transition:transform .08s, border-color .1s; position:relative; }
  .card:active { transform:scale(.97); }
  .card.mine { border-color:#ffd93d; box-shadow:0 0 0 3px rgba(255,217,61,.3); }
  .card .emoji { font-size:40px; }
  .card .cname { color:#fff; font-weight:800; font-size:17px; margin-top:2px; }
  .card .power { color:#ffd93d; font-size:12px; font-weight:700; margin-top:3px; }
  .card .stats { color:#b9a8e8; font-size:11px; margin-top:5px; line-height:1.4; }
  .card .badge { position:absolute; top:6px; right:8px; font-size:11px; font-weight:800;
    color:#fff; background:#e64a19; padding:2px 7px; border-radius:10px; }

  /* botão de poder no jogo */
  #specBtn { position:fixed; right:calc(env(safe-area-inset-right,0px) + 24px);
    bottom:calc(env(safe-area-inset-bottom,0px) + 96px); z-index:15;
    width:78px; height:78px; border-radius:50%;
    border:4px solid #fff; background:#673ab7; color:#fff; font-size:32px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(0,0,0,.5); }
  #specBtn:active { transform:scale(.9); }
  #specBtn.cool { opacity:.5; }
  #specCd { position:absolute; font-size:24px; font-weight:900; }
</style>
</head>
<body>

<div id="menu" class="overlay">
  <h1>BRAWL KIDS</h1>
  <p class="sub">jogo cooperativo · 2 celulares na mesma wifi</p>
  <button class="btn btn-host" id="btnHost">🎮 Criar sala</button>
  <button class="btn btn-join" id="btnGoJoin">🔑 Entrar com código</button>
</div>

<div id="waitScreen" class="overlay hidden">
  <p class="msg">Fala esse código pro seu irmão digitar:</p>
  <div class="code-big" id="codeShow">····</div>
  <p class="msg pulse" id="waitMsg">Aguardando jogador 2...</p>
  <button class="btn btn-back" id="btnCancelHost">Voltar</button>
</div>

<div id="joinScreen" class="overlay hidden">
  <p class="msg">Digite o código da sala:</p>
  <input id="codeInput" maxlength="4" autocomplete="off" placeholder="ABCD">
  <button class="btn btn-join" id="btnJoin">Entrar!</button>
  <p class="msg" id="joinMsg"></p>
  <button class="btn btn-back" id="btnCancelJoin">Voltar</button>
</div>

<div id="charScreen" class="overlay hidden">
  <h1 style="font-size:min(8vw,36px)">Escolha seu herói</h1>
  <div id="charGrid"></div>
  <button class="btn btn-go" id="btnReady" disabled>Escolha um herói</button>
  <p class="msg" id="readyMsg"></p>
</div>

<canvas id="game"></canvas>
<button id="fsBtn" title="Tela cheia">⛶</button>
<button id="specBtn" class="hidden"><span id="specIcon">⚡</span><span id="specCd"></span></button>

function tintCanvas(img,color,alpha){ const c=document.createElement('canvas'); c.width=img.naturalWidth; c.height=img.naturalHeight;
  const x=c.getContext('2d'); x.drawImage(img,0,0); x.globalCompositeOperation='source-atop'; x.globalAlpha=alpha; x.fillStyle=color; x.fillRect(0,0,c.width,c.height); return c; }
function buildTints(){ const z=IMG.zombie;
  ENEMY_IMG[0]=z; ENEMY_IMG[1]=tintCanvas(z,'#ffd54f',0.5); ENEMY_IMG[2]=tintCanvas(z,'#ab47bc',0.55); ENEMY_IMG[9]=tintCanvas(z,'#ef5350',0.55);
  ENEMY_WHITE=tintCanvas(z,'#ffffff',1); assetsReady=true; }
function drawSprite(img,x,y,ang,targetH){ const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
  const s=targetH/ih, w=iw*s, h=ih*s; ctx.save(); ctx.translate(x,y); ctx.rotate(ang); ctx.drawImage(img,-w/2,-h/2,w,h); ctx.restore(); }

// ============ TELAS ============
const $ = id => document.getElementById(id);
const screens = { menu:$('menu'), wait:$('waitScreen'), join:$('joinScreen'), char:$('charScreen') };
function showScreen(name) {
  for (const k in screens) screens[k].classList.toggle('hidden', k !== name);
  if (!name) for (const k in screens) screens[k].classList.add('hidden');
}

// ============ REDE ============
let peer=null, conn=null, isHost=false, connected=false;
function randomCode(){ const L='ABCDEFGHJKLMNPQRSTUVWXYZ'; let c=''; for(let i=0;i<4;i++) c+=L[Math.floor(Math.random()*L.length)]; return c; }
function cleanupPeer(){ connected=false; if(conn){try{conn.close();}catch(e){} conn=null;} if(peer){try{peer.destroy();}catch(e){} peer=null;} }
function hostRoom(){
  cleanupPeer(); isHost=true;
  const code=randomCode(); $('codeShow').textContent=code;
  $('waitMsg').textContent='Conectando ao servidor...'; showScreen('wait');
  peer=new Peer(PREFIX+code);
  peer.on('open',()=>{ $('waitMsg').textContent='Aguardando jogador 2...'; });
  peer.on('connection',c=>{ conn=c; conn.on('open',onConnected); wireConn(); });
  peer.on('error',err=>{ if(err.type==='unavailable-id') hostRoom(); else $('waitMsg').textContent='Erro de conexão. Tente de novo.'; });
}
function joinRoom(code){
  cleanupPeer(); isHost=false;
  $('joinMsg').textContent='Procurando sala '+code+'...';
  peer=new Peer();
  peer.on('open',()=>{ conn=peer.connect(PREFIX+code,{reliable:false}); conn.on('open',onConnected); wireConn();
    setTimeout(()=>{ if(!connected) $('joinMsg').textContent='Sala não encontrada. Confere o código?'; },8000); });
  peer.on('error',err=>{ $('joinMsg').textContent=(err.type==='peer-unavailable')?'Sala não encontrada. Confere o código?':'Erro de conexão. Tente de novo.'; });
}
function wireConn(){ conn.on('data',onData); conn.on('close',onDisconnect); conn.on('error',onDisconnect); }
function onDisconnect(){ if(!connected) return; cleanupPeer(); gameOn=false; showScreen('menu'); alert('O outro jogador saiu da partida.'); }

// ============ SELEÇÃO DE PERSONAGEM ============
let myPick=null, myReady=false, otherPick=null, otherReady=false;

function buildCharGrid(){
  const grid=$('charGrid'); grid.innerHTML='';
  for(const id of CHAR_ORDER){
    const ch=CHARS[id];
    const card=document.createElement('div');
    card.className='card'; card.dataset.id=id;
    card.innerHTML='<div class="emoji">'+ch.emoji+'</div><div class="cname">'+ch.name+'</div>'
      +'<div class="power">✨ '+ch.sp+'</div><div class="stats">'+ch.hint+'</div>';
    card.addEventListener('click',()=>pickChar(id));
    grid.appendChild(card);
  }
}
function pickChar(id){
  myPick=id; myReady=false;
  $('btnReady').disabled=false; $('btnReady').textContent='Pronto!';
  $('readyMsg').textContent='';
  refreshCards(); sendPick();
}
function refreshCards(){
  for(const card of document.querySelectorAll('.card')){
    const id=card.dataset.id;
    card.classList.toggle('mine', id===myPick);
    const old=card.querySelector('.badge'); if(old) old.remove();
    if(otherPick && id===otherPick){
      const b=document.createElement('div'); b.className='badge';
      b.textContent = otherReady ? 'P2 ✓' : 'P2';
      card.appendChild(b);
    }
  }
}
function onReady(){
  if(!myPick) return;
  myReady=true;
  $('btnReady').textContent='Aguardando o outro...';
  $('btnReady').disabled=true;
  sendPick(); maybeStart();
}
function sendPick(){ if(conn&&connected) conn.send({t:'pick', c:myPick, r:myReady}); }
function maybeStart(){
  if(isHost && myReady && otherReady && myPick && otherPick) beginMatch();
}

function onConnected(){
  connected=true;
  myPick=null; myReady=false; otherPick=null; otherReady=false;
  buildCharGrid();
  $('btnReady').disabled=true; $('btnReady').textContent='Escolha um herói';
  $('readyMsg').textContent='';
  showScreen('char');
}

let gameOn=false;
const sim = {
  players:[ mkPlayer(ARENA.w*0.35,ARENA.h/2), mkPlayer(ARENA.w*0.65,ARENA.h/2) ],
  enemies:[], bullets:[], effects:[],
  wave:0, waveState:'inter', timer:2.5, spawnQueue:[], spawnCd:0, bossAdd:0,
};
let enemyId=1;
function mkPlayer(x,y){ return { x,y,fx:1,hp:100,maxHp:100,aimx:0,aimy:0,fireCd:0,hurtT:0,downT:0,ang:0,px:x,py:y,
  char:'atirador',speed:300,fire:0.16,dmg:9,bspd:770,blife:1.35,spec:'burst',scd:4,specCd:0,buffT:0,wantSpec:false,specSeen:0 }; }
function applyChar(p,id){
  const ch=CHARS[id]||CHARS.atirador;
  p.char=id; p.maxHp=ch.hp; p.hp=ch.hp; p.speed=ch.spd; p.fire=ch.fire; p.dmg=ch.dmg;
  p.bspd=ch.bspd; p.blife=ch.blife; p.spec=ch.spec; p.scd=ch.scd;
  p.specCd=0; p.buffT=0; p.wantSpec=false;
}

function beginMatch(){
  applyChar(sim.players[0], myPick);
  applyChar(sim.players[1], otherPick);
  sim.players[0].x=ARENA.w*0.35; sim.players[0].y=ARENA.h/2;
  sim.players[1].x=ARENA.w*0.65; sim.players[1].y=ARENA.h/2;
  sim.players.forEach(p=>{ p.downT=0; p.hurtT=0; });
  sim.enemies=[]; sim.bullets=[]; sim.effects=[];
  sim.wave=0; sim.waveState='inter'; sim.timer=2.5; sim.spawnQueue=[]; sim.spawnCd=0;
  conn.send({ t:'start', h:myPick, g:otherPick });
  startPlaying();
}
function startPlaying(){
  showScreen(null);
  $('specBtn').classList.remove('hidden');
  gameOn=true; lastTime=performance.now();
  requestAnimationFrame(loop);
}

// convidado
let myCharId='atirador', otherCharId='atirador';
let snap=null;
const guestEnemies=new Map(); let guestBullets=[]; let guestEffects=[];
const guestLocal={ x:ARENA.w*0.65, y:ARENA.h/2, fx:1, speed:300, ang:0 };
let mySpecCount=0, mySpecAngle=0;

// ============ MENSAGENS ============
let lastSend=0, lastSnap=0;
const guestInput={ x:ARENA.w*0.65, y:ARENA.h/2, fx:1, ax:0, ay:0, f:false, sp:0, spAng:0 };

function onData(d){
  if(d.t==='pick'){ otherPick=d.c; otherReady=d.r; refreshCards(); maybeStart(); }
  else if(d.t==='start'){ // convidado inicia
    otherCharId=d.h; myCharId=d.g;
    guestLocal.speed=(CHARS[myCharId]||CHARS.atirador).spd;
    guestLocal.x=ARENA.w*0.65; guestLocal.y=ARENA.h/2;
    snap=null; guestEnemies.clear(); guestBullets=[]; guestEffects=[]; mySpecCount=0;
    startPlaying();
  }
  else if(d.t==='in'){
    guestInput.x=d.x; guestInput.y=d.y; guestInput.fx=d.fx;
    guestInput.ax=d.ax; guestInput.ay=d.ay; guestInput.f=d.f; guestInput.sp=d.sp; guestInput.spAng=(d.spa||0)/100;
  }
  else if(d.t==='snap'){
    snap=d;
    const seen=new Set();
    for(const e of d.e){ seen.add(e[0]);
      let g=guestEnemies.get(e[0]);
      if(!g){ g={x:e[1],y:e[2],tx:e[1],ty:e[2],hp:e[3],et:e[4],ang:0}; guestEnemies.set(e[0],g); }
      else { g.tx=e[1]; g.ty=e[2]; g.hp=e[3]; g.et=e[4]; }
    }
    for(const id of guestEnemies.keys()) if(!seen.has(id)){ const g=guestEnemies.get(id); spawnPoof(g.x,g.y,ETYPE[g.et].c,g.et===9?46:12); if(g.et===9){ addShake(14); sfxBoss(); } else sfxDeath(); guestEnemies.delete(id); }
    guestBullets=d.b.map(b=>({x:b[0],y:b[1],vx:b[2],vy:b[3],k:b[4]}));
    const newFx=(d.x||[]).map(f=>({x:f[0],y:f[1],r:f[2],col:f[3]}));
    if(newFx.length>guestEffects.length){ addShake(9); sfxBoom(); }
    guestEffects=newFx;
  }
  else if(d.t==='restart'){ if(isHost) restartMatch(); }
}
function restartMatch(){ beginMatch(); }

// ============ JOYSTICKS ============
function mkStick(){ return {active:false,id:null,ox:0,oy:0,dx:0,dy:0}; }
const stickMove=mkStick(), stickAim=mkStick();
const JOY_MAX=55, AIM_DEAD=12;
function isBtn(t){ return t.target && t.target.tagName==='BUTTON'; }
function pickStick(x){ return x<innerWidth/2 ? stickMove : stickAim; }
function touchStart(e){
  if(!gameOn) return;
  for(const t of e.changedTouches){
    if(isBtn(t)) continue;
    const s=pickStick(t.clientX); if(s.active) continue;
    s.active=true; s.id=t.identifier; s.ox=t.clientX; s.oy=t.clientY; s.dx=0; s.dy=0;
  }
}
function touchMove(e){
  if(specAim.active){ const r=$('specBtn').getBoundingClientRect(); const ox=r.left+r.width/2, oy=r.top+r.height/2;
    for(const t of e.changedTouches){ if(t.identifier!==specAim.id) continue;
      let dx=t.clientX-ox, dy=t.clientY-oy; const len=Math.hypot(dx,dy); const M=75;
      if(len>M){ dx=dx/len*M; dy=dy/len*M; } specAim.dx=dx; specAim.dy=dy; } }
  for(const t of e.changedTouches) for(const s of [stickMove,stickAim]){
    if(!s.active||s.id!==t.identifier) continue;
    let dx=t.clientX-s.ox, dy=t.clientY-s.oy; const len=Math.hypot(dx,dy);
    if(len>JOY_MAX){ dx=dx/len*JOY_MAX; dy=dy/len*JOY_MAX; }
    s.dx=dx; s.dy=dy;
  }
}
function touchEnd(e){
  if(specAim.active) for(const t of e.changedTouches){ if(t.identifier!==specAim.id) continue;
    const mag=Math.hypot(specAim.dx,specAim.dy);
    fireSpecial(mag>10 ? Math.atan2(specAim.dy,specAim.dx) : null);
    specAim.active=false; specAim.id=null; specAim.dx=0; specAim.dy=0;
  }
  for(const t of e.changedTouches) for(const s of [stickMove,stickAim])
    if(s.active&&s.id===t.identifier){ s.active=false; s.dx=0; s.dy=0; }
}
window.addEventListener('touchstart',e=>{ handleTapOverlay(); touchStart(e); },{passive:false});
window.addEventListener('touchmove',e=>{ e.preventDefault(); touchMove(e); },{passive:false});
window.addEventListener('touchend',touchEnd);
window.addEventListener('touchcancel',touchEnd);
let mouseDown=false;
window.addEventListener('mousedown',e=>{ if(!gameOn) return; handleTapOverlay(); if(e.target&&e.target.tagName==='BUTTON') return;
  mouseDown=true; const s=stickMove; s.active=true; s.id='m'; s.ox=e.clientX; s.oy=e.clientY; s.dx=0; s.dy=0; });
window.addEventListener('mousemove',e=>{ if(!mouseDown) return; const s=stickMove; let dx=e.clientX-s.ox,dy=e.clientY-s.oy; const l=Math.hypot(dx,dy); if(l>JOY_MAX){dx=dx/l*JOY_MAX;dy=dy/l*JOY_MAX;} s.dx=dx; s.dy=dy; });
window.addEventListener('mouseup',()=>{ mouseDown=false; stickMove.active=false; stickMove.dx=0; stickMove.dy=0; });

// botão de poder
function triggerSpecial(){
  if(!gameOn) return;
  audioInit(); sfxPower();
  if(isHost) sim.players[0].wantSpec=true;
  else { mySpecCount++; }
}
// botão de poder = joystick de mira (arrasta pra mirar, solta pra disparar)
const specAim={active:false,id:null,dx:0,dy:0};
function localSpecCd(){ if(isHost) return sim.players[0].specCd; return snap?snap.p[1][6]/10:0; }
function fireSpecial(ang){
  if(localSpecCd()>0) return;
  audioInit(); sfxPower();
  if(isHost){ const p=sim.players[0]; p.specAngle=(ang===null?p.ang:ang); p.wantSpec=true; }
  else { mySpecAngle=(ang===null?guestLocal.ang:ang); mySpecCount++; }
}
$('specBtn').addEventListener('touchstart',e=>{ e.preventDefault(); e.stopPropagation(); audioInit();
  if(!gameOn||localSpecCd()>0) return;
  const t=e.changedTouches[0]; specAim.active=true; specAim.id=t.identifier; specAim.dx=0; specAim.dy=0;
},{passive:false});

// reiniciar ao tocar em vitória/derrota
function requestRestart(){ if(isHost) restartMatch(); else if(conn) conn.send({t:'restart'}); }
function handleTapOverlay(){ const ws=curWaveState(); if(ws==='win'||ws==='lose') requestRestart(); }
function curWaveState(){ return isHost ? sim.waveState : (snap?snap.ws:'inter'); }

// ============ TELA CHEIA ============
function fsElement(){ return document.fullscreenElement||document.webkitFullscreenElement||null; }
function goFullscreen(){
  const el=document.documentElement; const req=el.requestFullscreen||el.webkitRequestFullscreen;
  if(req&&!fsElement()){ const p=req.call(el);
    const lock=()=>{ try{ if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); }catch(e){} };
    if(p&&p.then) p.then(lock).catch(()=>{}); else lock();
  }
}
function toggleFullscreen(){ if(fsElement()){ const ex=document.exitFullscreen||document.webkitExitFullscreen; if(ex) ex.call(document);} else goFullscreen(); }
$('fsBtn').addEventListener('click',toggleFullscreen);

// ============ LÓGICA (host) ============
function aliveTargets(){ return sim.players.filter(p=>p.downT<=0); }
function nearestPlayer(x,y){ let best=null,bd=Infinity; for(const p of aliveTargets()){ const d=(p.x-x)**2+(p.y-y)**2; if(d<bd){bd=d;best=p;} } return best; }

function spawnBullet(p,ang,kind){
  const spd = kind==='fire' ? p.bspd*0.62 : p.bspd;
  sim.bullets.push({ x:p.x, y:p.y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:kind==='fire'?1.6:p.blife, dmg:p.dmg, k:kind||null });
}
function firePlayer(p,dt){
  if(p.downT>0) return;
  const eff = p.buffT>0 ? p.fire*0.5 : p.fire;
  p.fireCd-=dt;
  const aiming=Math.hypot(p.aimx,p.aimy)>0.3;
  if(aiming && p.fireCd<=0){ p.fireCd=eff; spawnBullet(p, Math.atan2(p.aimy,p.aimx), null); }
}
function aimAngle(p){ return p.ang; }
function addEffect(x,y,mr,col){ sim.effects.push({x,y,r:0,mr,life:0.4,ml:0.4,col}); }
function explode(x,y,radius,dmg,col){
  addEffect(x,y,radius,col); addShake(9); spawnPoof(x,y,col,16); sfxBoom();
  for(const e of sim.enemies){ const tt=ETYPE[e.ty];
    if((e.x-x)**2+(e.y-y)**2 < (radius+tt.r)**2){ e.hp-=dmg; e.flash=0.08; } }
}
function activateSpecial(i,ang){
  const p=sim.players[i]; if(p.downT>0||p.specCd>0) return;
  if(ang===null||ang===undefined) ang=p.ang;
  p.specCd=p.scd;
  const col=(CHARS[p.char]||CHARS.atirador).c;
  if(p.spec==='pound'){
    addEffect(p.x,p.y,150,col); addShake(11); sfxBoom();
    for(const e of sim.enemies){ const t=ETYPE[e.ty];
      if((e.x-p.x)**2+(e.y-p.y)**2 < (150+t.r)**2){ e.hp-=70; e.flash=0.1;
        const a=Math.atan2(e.y-p.y,e.x-p.x); e.x+=Math.cos(a)*70; e.y+=Math.sin(a)*70; } }
  } else if(p.spec==='burst'){
    for(let k=-2;k<=2;k++) spawnBullet(p, ang + k*0.18, null);
  } else if(p.spec==='fireball'){
    spawnBullet(p, ang, 'fire');
  } else if(p.spec==='turbo'){
    p.buffT=4;
  }
}

function stepSim(dt){
  const P=sim.players;
  // input host
  { const p=P[0];
    if(p.downT<=0){
      const mx=stickMove.dx/JOY_MAX, my=stickMove.dy/JOY_MAX;
      const sp = p.buffT>0 ? p.speed*1.5 : p.speed;
      p.x+=mx*sp*dt; p.y+=my*sp*dt;
      if(Math.abs(mx)>0.15) p.fx=mx>0?1:-1;
      const am=Math.hypot(stickAim.dx,stickAim.dy);
      if(am>AIM_DEAD){ p.aimx=stickAim.dx/am; p.aimy=stickAim.dy/am; if(Math.abs(p.aimx)>0.2) p.fx=p.aimx>0?1:-1; }
      else { p.aimx=0; p.aimy=0; }
    }
    if(p.wantSpec){ activateSpecial(0, p.specAngle); p.wantSpec=false; }
  }
  // input convidado
  { const p=P[1];
    if(p.downT<=0){
      p.x=guestInput.x; p.y=guestInput.y; p.fx=guestInput.fx;
      p.aimx=guestInput.f?guestInput.ax:0; p.aimy=guestInput.f?guestInput.ay:0;
    }
    if(guestInput.sp>p.specSeen){ p.specSeen=guestInput.sp; activateSpecial(1, guestInput.spAng); }
  }
  // por jogador
  for(const p of P){
    p.x=Math.max(P_R+8,Math.min(ARENA.w-P_R-8,p.x));
    p.y=Math.max(P_R+8,Math.min(ARENA.h-P_R-8,p.y));
    if(Math.hypot(p.aimx,p.aimy)>0.3) p.ang=Math.atan2(p.aimy,p.aimx);
    else { const dx=p.x-p.px, dy=p.y-p.py; if(dx*dx+dy*dy>0.4) p.ang=Math.atan2(dy,dx); }
    p.px=p.x; p.py=p.y;
    if(p.buffT>0) p.buffT-=dt;
    if(p.specCd>0) p.specCd-=dt;
    firePlayer(p,dt);
    p.hurtT-=dt;
    if(p.downT>0){ p.downT-=dt; if(p.downT<=0) p.hp=p.maxHp*0.5; }
    else if(p.hurtT<=0 && p.hp<p.maxHp) p.hp=Math.min(p.maxHp, p.hp+P_REGEN*dt);
  }
  // balas
  for(let i=sim.bullets.length-1;i>=0;i--){
    const b=sim.bullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    let done=false, hitEnemy=false;
    if(b.x<0||b.x>ARENA.w||b.y<0||b.y>ARENA.h||b.life<=0) done=true;
    else for(const e of sim.enemies){ const t=ETYPE[e.ty];
      const rr = (b.k==='fire'?16:B_R)+t.r;
      if((e.x-b.x)**2+(e.y-b.y)**2 < rr*rr){ hitEnemy=true; done=true;
        if(b.k!=='fire'){ e.hp-=b.dmg; e.flash=0.08; } break; } }
    if(done){
      if(b.k==='fire') explode(b.x,b.y,120,95,'#ff7043');
      sim.bullets.splice(i,1);
    }
  }
  // inimigos
  for(let i=sim.enemies.length-1;i>=0;i--){
    const e=sim.enemies[i]; const t=ETYPE[e.ty];
    if(e.flash>0) e.flash-=dt;
    const tgt=nearestPlayer(e.x,e.y);
    if(tgt){
      const a=Math.atan2(tgt.y-e.y,tgt.x-e.x);
      e.ang=a;
      e.x+=Math.cos(a)*t.spd*dt; e.y+=Math.sin(a)*t.spd*dt;
      for(const p of aliveTargets()){
        if((p.x-e.x)**2+(p.y-e.y)**2 < (t.r+P_R)**2){
          p.hp-=t.dmg*dt; p.hurtT=P_HURT_DELAY;
          if(p.hp<=0 && p.downT<=0){ p.hp=0; p.downT=REVIVE_TIME; p.aimx=0; p.aimy=0; }
        }
      }
    }
    if(e.hp<=0){ spawnPoof(e.x,e.y,ETYPE[e.ty].c,e.ty===9?46:12); if(e.ty===9){ addShake(14); sfxBoss(); } else sfxDeath(); sim.enemies.splice(i,1); }
  }
  // efeitos
  for(let i=sim.effects.length-1;i>=0;i--){
    const f=sim.effects[i]; f.life-=dt; f.r += (f.mr-f.r)*Math.min(1,dt*10);
    if(f.life<=0) sim.effects.splice(i,1);
  }
  updateWaves(dt);
  if(sim.waveState!=='win'&&sim.waveState!=='lose'&&P[0].downT>0&&P[1].downT>0) sim.waveState='lose';
}

function spawnEnemy(ty){
  const side=Math.floor(Math.random()*4); let x,y;
  if(side===0){x=Math.random()*ARENA.w;y=-30;} else if(side===1){x=Math.random()*ARENA.w;y=ARENA.h+30;}
  else if(side===2){x=-30;y=Math.random()*ARENA.h;} else {x=ARENA.w+30;y=Math.random()*ARENA.h;}
  sim.enemies.push({ id:enemyId++, x, y, ty, hp:ETYPE[ty].hp, flash:0 });
}
function updateWaves(dt){
  const s=sim;
  if(s.waveState==='win'||s.waveState==='lose') return;
  if(s.waveState==='inter'){
    s.timer-=dt;
    if(s.timer<=0){
      s.wave++;
      if(s.wave>WAVES.length){ s.waveState='win'; return; }
      s.spawnQueue=WAVES[s.wave-1].slice(); s.spawnCd=0; s.bossAdd=6;
      s.waveState=(s.wave===WAVES.length)?'boss':'fight';
    }
    return;
  }
  if(s.spawnQueue.length){ s.spawnCd-=dt; if(s.spawnCd<=0){ spawnEnemy(s.spawnQueue.shift()); s.spawnCd=0.55; } }
  if(s.waveState==='boss'){ s.bossAdd-=dt; if(s.bossAdd<=0 && s.enemies.some(e=>e.ty===9)){ spawnEnemy(0); s.bossAdd=4; } }
  if(s.spawnQueue.length===0 && s.enemies.length===0){
    if(s.wave>=WAVES.length) s.waveState='win';
    else { s.waveState='inter'; s.timer=3; }
  }
}

function broadcastSnap(now){
  if(!conn||!connected) return;
  if(now-lastSnap<1000/SNAP_HZ) return; lastSnap=now;
  conn.send({
    t:'snap',
    p: sim.players.map(p=>[Math.round(p.x),Math.round(p.y),p.fx,Math.round(p.hp),Math.round(p.downT*10),
        CHAR_ORDER.indexOf(p.char),Math.round(p.specCd*10),p.buffT>0?1:0,Math.round(p.maxHp),Math.round(p.ang*100)]),
    e: sim.enemies.map(e=>[e.id,Math.round(e.x),Math.round(e.y),Math.round(e.hp),e.ty]),
    b: sim.bullets.map(b=>[Math.round(b.x),Math.round(b.y),Math.round(b.vx),Math.round(b.vy),b.k==='fire'?1:0]),
    x: sim.effects.map(f=>[Math.round(f.x),Math.round(f.y),Math.round(f.r),f.col]),
    w: sim.wave, ws: sim.waveState,
  });
}

// ============ CONVIDADO ============
function guestStep(dt){
  const p=guestLocal;
  const s1=snap?snap.p[1]:null;
  const dwn=s1 && s1[4]>0;
  const buff=s1 && s1[7]===1;
  if(!dwn){
    const mx=stickMove.dx/JOY_MAX, my=stickMove.dy/JOY_MAX;
    const sp=buff?p.speed*1.5:p.speed;
    p.x+=mx*sp*dt; p.y+=my*sp*dt;
    if(Math.abs(mx)>0.15) p.fx=mx>0?1:-1;
  }
  p.x=Math.max(P_R+8,Math.min(ARENA.w-P_R-8,p.x));
  p.y=Math.max(P_R+8,Math.min(ARENA.h-P_R-8,p.y));
  // ângulo do próprio jogador: mira senão movimento
  const am2=Math.hypot(stickAim.dx,stickAim.dy);
  if(am2>AIM_DEAD) p.ang=Math.atan2(stickAim.dy,stickAim.dx);
  else { const mx=stickMove.dx, my=stickMove.dy; if(mx*mx+my*my>4) p.ang=Math.atan2(my,mx); }
  for(const b of guestBullets){ b.x+=b.vx*dt; b.y+=b.vy*dt; }
  for(const g of guestEnemies.values()){
    const ox=g.x, oy=g.y;
    g.x+=(g.tx-g.x)*Math.min(1,dt*14); g.y+=(g.ty-g.y)*Math.min(1,dt*14);
    const ddx=g.tx-ox, ddy=g.ty-oy; if(ddx*ddx+ddy*ddy>1) g.ang=Math.atan2(ddy,ddx);
  }
}
function guestSend(now){
  if(!conn||!connected) return;
  if(now-lastSend<1000/SEND_HZ) return; lastSend=now;
  let ax=0,ay=0,f=false; const am=Math.hypot(stickAim.dx,stickAim.dy);
  if(am>AIM_DEAD){ ax=stickAim.dx/am; ay=stickAim.dy/am; f=true; }
  let fx=guestLocal.fx; if(f&&Math.abs(ax)>0.2) fx=ax>0?1:-1;
  conn.send({ t:'in', x:Math.round(guestLocal.x), y:Math.round(guestLocal.y), fx, ax, ay, f, sp:mySpecCount, spa:Math.round(mySpecAngle*100) });
}

const canvas=$('game'); const ctx=canvas.getContext('2d');
let scale=1, offX=0, offY=0;
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=innerWidth*dpr; canvas.height=innerHeight*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  scale=Math.min(innerWidth/ARENA.w, innerHeight/ARENA.h);

}

// ---- FX do cliente (locais, não afetam a rede) ----
let shake=0;
const particles=[];
function addShake(a){ shake=Math.min(16, shake+a); }
function spawnPoof(x,y,col,n){
  n=n||12;
  for(let i=0;i<n;i++){ const a=Math.random()*7, s=50+Math.random()*180;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.35+Math.random()*0.35,ml:0.7,col,size:2.5+Math.random()*4.5}); }
}
function updateClientFx(dt){
  if(shake>0) shake=Math.max(0, shake-dt*45);
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.88; p.vy*=0.88; p.life-=dt;
    if(p.life<=0) particles.splice(i,1); }
}
function drawParticles(){
  for(const p of particles){ ctx.globalAlpha=Math.max(0,p.life/p.ml); ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
}
function rrect(x,y,w,h,r){ ctx.beginPath(); if(ctx.roundRect) ctx.roundRect(x,y,w,h,r); else ctx.rect(x,y,w,h); }

// ---- decorações fixas (mesma disposição pros dois jogadores) ----
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
const DECOR = (function(){
  const rng=mulberry32(20260721); const bushes=[], crates=[];
  function far(x,y){ // longe dos pontos de nascimento dos jogadores
    return Math.hypot(x-ARENA.w*0.35,y-ARENA.h/2)>120 && Math.hypot(x-ARENA.w*0.65,y-ARENA.h/2)>120;
  }
  let tries=0;
  while(bushes.length<12 && tries<400){ tries++;
    const x=80+rng()*(ARENA.w-160), y=80+rng()*(ARENA.h-160);
    if(far(x,y)) bushes.push({x,y,r:24+rng()*18}); }
  tries=0;
  while(crates.length<9 && tries<400){ tries++;
    const x=80+rng()*(ARENA.w-160), y=80+rng()*(ARENA.h-160);
    if(far(x,y)) crates.push({x,y,s:34+rng()*12}); }
  return {bushes,crates};
})();

function drawBush(x,y,r){
  ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(x,y+r*0.6,r*1.05,r*0.4,0,0,7); ctx.fill();
  ctx.fillStyle='#1f6e3c';
  for(const o of [[-r*0.55,r*0.1,r*0.7],[r*0.55,r*0.1,r*0.7],[0,-r*0.35,r*0.8],[0,r*0.25,r*0.72]])
    { ctx.beginPath(); ctx.arc(x+o[0],y+o[1],o[2],0,7); ctx.fill(); }
  ctx.fillStyle='#34a15b';
  for(const o of [[-r*0.4,-r*0.2,r*0.4],[r*0.35,-r*0.15,r*0.38],[0,-r*0.35,r*0.45]])
    { ctx.beginPath(); ctx.arc(x+o[0],y+o[1],o[2],0,7); ctx.fill(); }
}
function drawCrate(x,y,s){
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='rgba(0,0,0,.28)'; rrect(-s/2+3,-s/2+6,s,s,9); ctx.fill();
  const g=ctx.createLinearGradient(0,-s/2,0,s/2); g.addColorStop(0,'#d29457'); g.addColorStop(1,'#a86a32');
  ctx.fillStyle=g; rrect(-s/2,-s/2,s,s,9); ctx.fill();
  ctx.strokeStyle='#7a4a1e'; ctx.lineWidth=3; ctx.stroke();
  ctx.strokeStyle='rgba(122,74,30,.65)'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-s/2+5,-s/2+5); ctx.lineTo(s/2-5,s/2-5); ctx.moveTo(s/2-5,-s/2+5); ctx.lineTo(-s/2+5,s/2-5); ctx.stroke();
  ctx.fillStyle='#5c3714';
  for(const c of [[-s/2+7,-s/2+7],[s/2-7,-s/2+7],[-s/2+7,s/2-7],[s/2-7,s/2-7]]) { ctx.beginPath(); ctx.arc(c[0],c[1],2.4,0,7); ctx.fill(); }
  ctx.restore();
}
function drawDecor(){
  for(const b of DECOR.bushes) drawBush(b.x,b.y,b.r);
  for(const c of DECOR.crates) drawCrate(c.x,c.y,c.s);
}

function drawArena(){
  ctx.fillStyle='#0d0820'; ctx.fillRect(-offX/scale,-offY/scale,innerWidth/scale,innerHeight/scale);
  const g=ctx.createLinearGradient(0,0,0,ARENA.h);
  g.addColorStop(0,'#3ba062'); g.addColorStop(1,'#2b7d49');
  ctx.fillStyle=g; ctx.fillRect(0,0,ARENA.w,ARENA.h);
  ctx.fillStyle='rgba(255,255,255,.04)'; const T=80;
  for(let gy=0;gy<ARENA.h/T;gy++) for(let gx=0;gx<ARENA.w/T;gx++) if((gx+gy)%2===0) ctx.fillRect(gx*T,gy*T,T,T);
  drawDecor();
  ctx.lineJoin='round';
  ctx.strokeStyle='#5c3d22'; ctx.lineWidth=18; ctx.strokeRect(9,9,ARENA.w-18,ARENA.h-18);
  ctx.strokeStyle='#ffd93d'; ctx.lineWidth=5; ctx.strokeRect(9,9,ARENA.w-18,ARENA.h-18);
  const v=ctx.createRadialGradient(ARENA.w/2,ARENA.h/2,ARENA.h*0.36,ARENA.w/2,ARENA.h/2,ARENA.h*0.78);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,0.30)');
  ctx.fillStyle=v; ctx.fillRect(0,0,ARENA.w,ARENA.h);
}
function drawEffect(x,y,r,col){
  ctx.save();
  const g=ctx.createRadialGradient(x,y,r*0.3,x,y,r);
  g.addColorStop(0,'rgba(255,255,255,0)'); g.addColorStop(0.7,(col||'#fff')); g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.globalAlpha=0.35; ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
  ctx.globalAlpha=0.75; ctx.strokeStyle=col||'#fff'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.stroke();
  ctx.restore();
}
function drawPlayer(x,y,fx,hp,maxHp,downT,charIdx,slot,buff,ang){
  const ch=CHARS[CHAR_ORDER[charIdx]]||CHARS.atirador;
  const ring = slot===0 ? '#4fc3f7' : '#ff8a65';
  const label = slot===0 ? 'P1' : 'P2';
  const img=IMG[CHAR_ORDER[charIdx]]; const ready=img&&img.complete&&img.naturalWidth;
  const R=P_R; ang=ang||0;
  // anel de time no chão
  ctx.save(); ctx.strokeStyle=ring; ctx.lineWidth=4; ctx.globalAlpha=0.9;
  ctx.beginPath(); ctx.ellipse(x,y+R*0.85,R*1.05,R*0.42,0,0,7); ctx.stroke();
  ctx.globalAlpha=0.16; ctx.fillStyle=ring; ctx.beginPath(); ctx.ellipse(x,y+R*0.85,R*1.05,R*0.42,0,0,7); ctx.fill(); ctx.restore();
  if(downT>0){
    if(ready){ ctx.globalAlpha=0.5; drawSprite(img,x,y,ang,R*2.4); ctx.globalAlpha=1; }
    ctx.font='700 22px system-ui'; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillStyle='#fff'; ctx.fillText('💫',x,y-2);
    ctx.fillStyle='#ffd93d'; ctx.font='700 13px system-ui'; ctx.fillText('revive '+Math.ceil(downT)+'s',x,y-R-20);
    return;
  }
  if(buff){ ctx.save(); ctx.globalAlpha=0.55; ctx.strokeStyle='#fff59d'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(x,y,R+8+Math.sin(performance.now()/120)*1.5,0,7); ctx.stroke(); ctx.restore(); }
  ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(x,y+R*0.8,R*0.7,R*0.24,0,0,7); ctx.fill();
  if(ready) drawSprite(img,x,y,ang,R*2.4);
  else { ctx.fillStyle=ch.c; ctx.strokeStyle=ch.d; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(x,y,R,0,7); ctx.fill(); ctx.stroke(); }
  // emoji de classe (identifica o herói)
  ctx.font=(R*0.66)+'px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(ch.emoji,x,y-R-4); ctx.textBaseline='alphabetic';
  // barra de vida + nome
  const bw=54,bh=7,bx=x-bw/2,by=y-R-24;
  ctx.fillStyle='rgba(0,0,0,.55)'; rrect(bx-2,by-2,bw+4,bh+4,4); ctx.fill();
  ctx.fillStyle=hp>maxHp*.5?'#66bb6a':hp>maxHp*.25?'#ffca28':'#ef5350';
  rrect(bx,by,bw*Math.max(0,hp)/maxHp,bh,3); ctx.fill();
  ctx.fillStyle=ring; ctx.font='800 13px system-ui'; ctx.textAlign='center'; ctx.fillText(label,x,by-6);
}
function drawEnemy(x,y,ty,hp,flash,ang){
  const t=ETYPE[ty]; ang=ang||0;
  const img=assetsReady?ENEMY_IMG[ty]:null;
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.beginPath(); ctx.ellipse(x,y+t.r*0.7,t.r*0.9,t.r*0.28,0,0,7); ctx.fill();
  if(img){
    drawSprite(img,x,y,ang,t.r*2.1);
    if(flash>0 && ENEMY_WHITE){ ctx.globalAlpha=0.85; drawSprite(ENEMY_WHITE,x,y,ang,t.r*2.1); ctx.globalAlpha=1; }
  } else {
    ctx.fillStyle=flash>0?'#fff':t.c; ctx.strokeStyle=t.d; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(x,y,t.r,0,7); ctx.fill(); ctx.stroke();
  }
  if(ty===9){
    ctx.font=(t.r*0.5)+'px system-ui'; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillText('👑',x,y-t.r*0.95);
    const bw=t.r*2.4,bx=x-bw/2,by=y-t.r-22;
    ctx.fillStyle='rgba(0,0,0,.55)'; rrect(bx-2,by-2,bw+4,11,4); ctx.fill();
    ctx.fillStyle='#ef5350'; rrect(bx,by,bw*Math.max(0,hp)/ETYPE[9].hp,7,3); ctx.fill();
  }
}
function lighten(hex,amt){
  const n=parseInt(hex.slice(1),16); let r=(n>>16)+amt, g=((n>>8)&255)+amt, b=(n&255)+amt;
  r=Math.min(255,r); g=Math.min(255,g); b=Math.min(255,b);
  return 'rgb('+r+','+g+','+b+')';
}
function drawBullet(x,y,fire,vx,vy){
  const len=Math.hypot(vx||0,vy||0)||1; const ux=(vx||0)/len, uy=(vy||0)/len;
  if(fire){
    ctx.strokeStyle='rgba(255,112,67,.5)'; ctx.lineWidth=16; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x-ux*22,y-uy*22); ctx.lineTo(x,y); ctx.stroke(); ctx.lineCap='butt';
    ctx.fillStyle='#ff7043'; ctx.beginPath(); ctx.arc(x,y,14,0,7); ctx.fill();
    ctx.fillStyle='#ffe082'; ctx.beginPath(); ctx.arc(x,y,7,0,7); ctx.fill(); return;
  }
  ctx.strokeStyle='rgba(255,241,118,.45)'; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x-ux*14,y-uy*14); ctx.lineTo(x,y); ctx.stroke(); ctx.lineCap='butt';
  ctx.fillStyle='#fff9c4'; ctx.beginPath(); ctx.arc(x,y,B_R,0,7); ctx.fill();
  ctx.strokeStyle='#fbc02d'; ctx.lineWidth=2; ctx.stroke();
}
function drawStick(s,color){ if(!s.active) return;
  ctx.save(); ctx.globalAlpha=0.45; ctx.strokeStyle=color; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(s.ox,s.oy,JOY_MAX,0,7); ctx.stroke();
  ctx.fillStyle=color; ctx.beginPath(); ctx.arc(s.ox+s.dx,s.oy+s.dy,22,0,7); ctx.fill(); ctx.restore();
}
function bannerText(){
  const ws=curWaveState(); const w=isHost?sim.wave:(snap?snap.w:0);
  if(ws==='win') return ['VITÓRIA! 🏆','toque pra jogar de novo'];
  if(ws==='lose') return ['VOCÊS CAÍRAM','toque pra tentar de novo'];
  if(ws==='inter') return ['PREPARAR...', w>=1?('onda '+w+' vencida!'):'começando'];
  if(ws==='boss') return ['CHEFE!','derrotem ele juntos'];
  if(ws==='fight') return ['ONDA '+w, null];
  return [null,null];
}
function render(){
  ctx.save(); ctx.clearRect(0,0,innerWidth,innerHeight);
  const sx=shake>0?(Math.random()*2-1)*shake:0, sy=shake>0?(Math.random()*2-1)*shake:0;
  ctx.translate(offX+sx,offY+sy); ctx.scale(scale,scale);
  drawArena();
  if(isHost){
    for(const f of sim.effects) drawEffect(f.x,f.y,f.r,f.col);
    for(const e of sim.enemies) drawEnemy(e.x,e.y,e.ty,e.hp,e.flash,e.ang);
    for(const b of sim.bullets) drawBullet(b.x,b.y,b.k==='fire',b.vx,b.vy);
    const p1=sim.players[1], p0=sim.players[0];
    drawPlayer(p1.x,p1.y,p1.fx,p1.hp,p1.maxHp,p1.downT,CHAR_ORDER.indexOf(p1.char),1,p1.buffT>0,p1.ang);
    drawPlayer(p0.x,p0.y,p0.fx,p0.hp,p0.maxHp,p0.downT,CHAR_ORDER.indexOf(p0.char),0,p0.buffT>0,p0.ang);
  } else if(snap){
    for(const f of guestEffects) drawEffect(f.x,f.y,f.r,f.col);
    for(const g of guestEnemies.values()) drawEnemy(g.x,g.y,g.et,g.hp,0,g.ang||0);
    for(const b of guestBullets) drawBullet(b.x,b.y,b.k===1,b.vx,b.vy);
    const s0=snap.p[0]; drawPlayer(s0[1],s0[2],s0[0],s0[3],s0[8],s0[4]/10,s0[5],0,s0[7]===1,(s0[9]||0)/100);
    const s1=snap.p[1]; drawPlayer(guestLocal.x,guestLocal.y,guestLocal.fx,s1[3],s1[8],s1[4]/10,s1[5],1,s1[7]===1,guestLocal.ang);
  }
  drawParticles();
  // seta de mira do poder (enquanto arrasta o botão)
  if(specAim.active){
    let lx,ly,fb,downed;
    if(isHost){ const p=sim.players[0]; lx=p.x; ly=p.y; fb=p.ang; downed=p.downT>0; }
    else { lx=guestLocal.x; ly=guestLocal.y; fb=guestLocal.ang; downed=snap&&snap.p[1][4]>0; }
    if(!downed){
      const mag=Math.hypot(specAim.dx,specAim.dy);
      const a=mag>10?Math.atan2(specAim.dy,specAim.dx):fb;
      const L=220, ex=lx+Math.cos(a)*L, ey=ly+Math.sin(a)*L;
      ctx.save(); ctx.strokeStyle='rgba(255,217,61,.85)'; ctx.lineWidth=6; ctx.setLineDash([16,12]); ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(ex,ey); ctx.stroke(); ctx.setLineDash([]); ctx.lineCap='butt';
      ctx.translate(ex,ey); ctx.rotate(a); ctx.fillStyle='rgba(255,217,61,.95)';
      ctx.beginPath(); ctx.moveTo(6,0); ctx.lineTo(-22,-13); ctx.lineTo(-22,13); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }
  // banner central: vitória/derrota/intervalo persistem; onda/chefe só piscam no início
  let big=null, small=null;
  const ws=curWaveState(); const wv=isHost?sim.wave:(snap?snap.w:0);
  if(ws==='win'){ big='VITÓRIA! 🏆'; small='toque pra jogar de novo'; }
  else if(ws==='lose'){ big='VOCÊS CAÍRAM'; small='toque pra tentar de novo'; }
  else if(ws==='inter'){ big='PREPARAR...'; small=wv>=1?('onda '+wv+' vencida!'):'começando'; }
  else if(performance.now()<flashUntil){ big=flashText; small=flashSub; }
  if(big){ ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fillRect(0,ARENA.h/2-70,ARENA.w,140);
    ctx.fillStyle='#ffd93d'; ctx.font='900 64px system-ui'; ctx.fillText(big,ARENA.w/2,ARENA.h/2+6);
    if(small){ ctx.fillStyle='#fff'; ctx.font='700 26px system-ui'; ctx.fillText(small,ARENA.w/2,ARENA.h/2+46); }
  }
  ctx.restore();
  drawStick(stickMove,'#4fc3f7'); drawStick(stickAim,'#ffd93d');
  // contador de onda discreto (canto superior esquerdo)
  if(ws==='fight'||ws==='boss'){
    ctx.fillStyle='rgba(255,255,255,.55)'; ctx.font='800 14px system-ui'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.fillText('Onda '+wv+'/'+WAVES.length, 12, 26);
  }
  updateSpecBtn();
}
function updateSpecBtn(){
  const btn=$('specBtn'); if(btn.classList.contains('hidden')) return;
  const charId = isHost ? sim.players[0].char : myCharId;
  const ch=CHARS[charId]||CHARS.atirador;
  let cd=0;
  if(isHost) cd=Math.max(0,sim.players[0].specCd);
  else if(snap) cd=Math.max(0,snap.p[1][6]/10);
  btn.style.background=ch.d;
  $('specIcon').textContent = cd>0 ? '' : ch.emoji;
  $('specCd').textContent = cd>0 ? Math.ceil(cd) : '';
  btn.classList.toggle('cool', cd>0);
}

// ============ SOM (WebAudio procedural) ============
let actx=null;
function audioInit(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){} }
function blip(freq,dur,type,vol,slideTo){ if(!actx) return; const t=actx.currentTime;
  const o=actx.createOscillator(),g=actx.createGain(); o.type=type||'square'; o.frequency.setValueAtTime(freq,t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,t+dur);
  g.gain.setValueAtTime(vol||0.15,t); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+dur+0.02); }
function noise(dur,vol,cut){ if(!actx) return; const t=actx.currentTime; const len=Math.floor(actx.sampleRate*dur);
  const buf=actx.createBuffer(1,len,actx.sampleRate); const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const n=actx.createBufferSource(); n.buffer=buf; const g=actx.createGain();
  g.gain.setValueAtTime(vol||0.25,t); g.gain.exponentialRampToValueAtTime(0.0008,t+dur);
  const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=cut||1400;
  n.connect(f); f.connect(g); g.connect(actx.destination); n.start(t); n.stop(t+dur+0.02); }
function sfxShoot(){ blip(760,0.07,'square',0.06,320); }
function sfxDeath(){ noise(0.18,0.20,1600); blip(200,0.16,'sawtooth',0.11,70); }
function sfxBoss(){ noise(0.5,0.32,900); blip(110,0.5,'sawtooth',0.2,38); }
function sfxBoom(){ noise(0.32,0.30,1000); blip(150,0.26,'sawtooth',0.17,48); }
function sfxPower(){ blip(380,0.22,'triangle',0.18,920); }
function sfxWave(){ blip(520,0.12,'square',0.14,720); setTimeout(()=>blip(720,0.12,'square',0.12,900),120); }
function sfxWin(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,0.2,'triangle',0.16),i*140)); }
function sfxLose(){ [400,300,200].forEach((f,i)=>setTimeout(()=>blip(f,0.25,'sawtooth',0.15,f*0.7),i*160)); }
function sfxHurt(){ blip(170,0.1,'square',0.09,90); }

let prevWs=null, flashText=null, flashSub=null, flashUntil=0, localFireSnd=0, prevLocalHp=999;
function localShootSound(dt){
  const aiming=Math.hypot(stickAim.dx,stickAim.dy)>AIM_DEAD;
  let fire=0.2, buff=false, downed=false;
  if(isHost){ const p=sim.players[0]; fire=p.fire; buff=p.buffT>0; downed=p.downT>0; }
  else { fire=(CHARS[myCharId]||CHARS.atirador).fire; const s1=snap?snap.p[1]:null; buff=s1&&s1[7]===1; downed=s1&&s1[4]>0; }
  if(downed){ localFireSnd=0; return; }
  localFireSnd-=dt;
  if(aiming && localFireSnd<=0){ sfxShoot(); localFireSnd=buff?fire*0.5:fire; }
}
function updateAudioEvents(){
  const ws=curWaveState();
  if(ws!==prevWs){
    if(ws==='fight'||ws==='boss'){ const w=isHost?sim.wave:(snap?snap.w:0);
      flashText=ws==='boss'?'CHEFE!':'ONDA '+w; flashSub=ws==='boss'?'derrotem juntos!':null;
      flashUntil=performance.now()+1600; sfxWave(); }
    else if(ws==='win') sfxWin();
    else if(ws==='lose') sfxLose();
    prevWs=ws;
  }
  const hp=isHost?sim.players[0].hp:(snap?snap.p[1][3]:prevLocalHp);
  if(hp<prevLocalHp-3) sfxHurt();
  prevLocalHp=hp;
}

// ============ LOOP ============
let lastTime=0;
function loop(now){
  if(!gameOn) return;
  const dt=Math.min((now-lastTime)/1000,0.05); lastTime=now;
  if(isHost){ stepSim(dt); broadcastSnap(now); }
  else { guestStep(dt); guestSend(now); }
  updateClientFx(dt);
  localShootSound(dt);
  updateAudioEvents();
  render();
  requestAnimationFrame(loop);
}

// ============ BOTÕES ============
$('btnHost').addEventListener('click',()=>{ audioInit(); goFullscreen(); hostRoom(); });
$('btnGoJoin').addEventListener('click',()=>{ audioInit(); goFullscreen(); $('joinMsg').textContent=''; showScreen('join'); });
$('btnJoin').addEventListener('click',()=>{ const code=$('codeInput').value.trim().toUpperCase();
  if(code.length===4) joinRoom(code); else $('joinMsg').textContent='O código tem 4 letras.'; });
$('btnReady').addEventListener('click',onReady);
$('btnCancelHost').addEventListener('click',()=>{ cleanupPeer(); showScreen('menu'); });
$('btnCancelJoin').addEventListener('click',()=>{ cleanupPeer(); showScreen('menu'); });
